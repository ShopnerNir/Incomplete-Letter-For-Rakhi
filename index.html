<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>রাখী সরকার + উৎসব সরকার</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  font-family:'Noto Serif Bengali', serif;
  background: radial-gradient(circle at top, #2b2b55, #0f0f1a);
  background-attachment: fixed;
  color:#fff;
}

/* wrapper */
.wrapper{
  display:flex;
  justify-content:center;
}

/* container */
.container{
  width:92%;
  max-width:750px;
  padding:30px;
  margin:60px 0;

  border-radius:20px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  box-shadow:0 15px 60px rgba(0,0,0,0.7);

  position:relative;
  z-index:2;
  text-align:center;
}

h1{
  font-size:26px;
  margin-bottom:15px;
  color:#ffb6c1;
}

.desc{
  font-size:15px;
  margin-bottom:20px;
  color:#ddd;
  line-height:1.7;
}

input{
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
  text-align:center;
  margin-bottom:10px;
  width:180px;
}

.btn{
  padding:10px 18px;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,#ff4b91,#ff7eb3);
  color:#fff;
  cursor:pointer;
}

/* letter */
.letter{
  margin-top:25px;
  text-align:justify;
  line-height:1.9;
  font-size:17px;
  display:none;

  border-left:3px solid #ff9acb;
  padding-left:15px;
  white-space:pre-line;
}

/* cursor */
.cursor{
  display:inline-block;
  width:2px;
  background:#fff;
  margin-left:3px;
  animation: blink 1s infinite;
}

@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}

/* ❤️ quote box */
.quote-box{
  margin-top:25px;
  padding:20px;
  border-radius:15px;

  background:linear-gradient(135deg, rgba(255,75,145,0.2), rgba(255,126,179,0.2));
  border:1px solid rgba(255,255,255,0.2);

  font-size:18px;
  text-align:center;
  display:none;

  backdrop-filter: blur(10px);
}

/* hearts */
.heart{
  position:fixed;
  width:18px;
  height:18px;
  background:#ff4b91;
  transform:rotate(45deg);
  animation: float 10s linear infinite;

  opacity:0.7;
}

.heart::before,
.heart::after{
  content:'';
  position:absolute;
  width:18px;
  height:18px;
  background:#ff4b91;
  border-radius:50%;
}

.heart::before{top:-9px;}
.heart::after{left:-9px;}

@keyframes float{
  0%{transform:translateY(100vh) rotate(45deg);opacity:0;}
  20%{opacity:0.8;}
  100%{transform:translateY(-10vh) rotate(45deg);opacity:0;}
}

/* 📱 mobile */
@media(max-width:600px){
  .container{
    padding:20px;
  }
  h1{font-size:22px;}
  .letter{font-size:16px;}
  .quote-box{font-size:16px;}
}

</style>
</head>

<body>

<div class="wrapper">
<div class="container">

<h1>ভালোবাসার অসম্পূর্ণ চিঠি</h1>

<div class="desc" id="desc">
  তোমাকে একটা চিঠি দিয়েছিলাম। কিন্তু কোনো এক অজানা কারণে চিঠিটা লিখে শেষ করতে পারিনি।
  
  তাই বাকি চিঠিটা এই ওয়েবসাইটের মাধ্যমে প্রকাশ করলাম।
</div>

<div id="auth">
  <input type="password" id="password" placeholder="পাসওয়ার্ড লিখো..."><br>
  <button class="btn" onclick="checkPassword()">Open 💌</button>
</div>

<button class="btn" id="startBtn" style="display:none; margin-top:10px;">
  বাকি চিঠিটা পড়ো 💌
</button>

<div class="letter" id="letter">
  <span id="text"></span><span class="cursor"></span>
</div>

<div class="quote-box" id="quote">
  I love you Rakhi. 🙃 🩵💙💜
</div>

</div>
</div>

<script>

const correctPassword = "Rakhi+Utsab-22.01.2026";

function checkPassword(){
  const pass = document.getElementById("password").value;
  if(pass === correctPassword){
    document.getElementById("auth").style.display="none";
    document.getElementById("desc").style.display="none";
    document.getElementById("startBtn").style.display="inline-block";
  }else{
    alert("ভুল পাসওয়ার্ড 😒");
  }
}

const text = `ুধু একজন মানুষ নও। তুমি আমার দিনের শুরু, রাতের শেষ। তুমি আমার স্বপ্নের ভেতর ঘুরে বেড়ানো একমাত্র মুখ। আমি যখন ভবিষ্যৎ কল্পনা করি, সেখানে তুমি ছাড়া আর কাউকে দেখি না। তোমাকে ছাড়া কোনো ছবিই পূর্ণ হয় না।

তোমার চোখের দিকে তাকালে আমার মনে হয় আমি পৃথিবীর সবচেয়ে নিরাপদ জায়গায় আছি। তোমার কণ্ঠ শুনলে মনে হয় কেউ খুব নরম করে আমার সমস্ত অস্থিরতা ছুঁয়ে দিচ্ছে। তোমার ছোট ছোট অভিমান, তোমার নরম কথাগুলো, তোমার চুপ করে থাকা, সবকিছুই আমার কাছে অমূল্য।

আমি তোমার ভালোবাসায় কোনো শর্ত রাখতে চাই না। আমি চাই না তুমি বদলে যাও, আমি চাই না তুমি অন্য কারও মতো হও। তুমি যেমন, ঠিক তেমনটাই আমার কাছে সবচেয়ে সুন্দর। তোমার সরলতা, তোমার জেদ, তোমার হাসি, তোমার কান্না সবকিছু মিলিয়েই তুমি আমার রাখি।

রাখি, আমি কখনো তোমাকে হারানোর কথা ভাবতে পারি না। কারণ তোমাকে হারানো মানে আমার নিজের একটা অংশ হারানো। তুমি আমার ভেতরে এমনভাবে মিশে গেছো যে তোমাকে আলাদা করে ভাবাই অসম্ভব। আমি যখন নিজের কথা ভাবি, তখন সেখানে তোমার ছায়া জড়িয়ে থাকে।

আমি জানি জীবন সবসময় সহজ হবে না। অনেক ঝড় আসবে, অনেক ভুল বোঝাবুঝি হবে। কিন্তু একটা কথা আমি তোমাকে প্রতিশ্রুতি দিয়ে বলতে চাই, আমি তোমার হাত কখনো ছাড়বো না। আমি তোমার পাশে দাঁড়িয়ে থাকবো, এমনকি যখন পুরো পৃথিবী বিপরীতে দাঁড়াবে তখনও।

রাখি, তোমার সুখ আমার কাছে নিজের সুখের চেয়েও বড়। তুমি হাসলে আমার দিন ভালো যায়। তুমি মন খারাপ করলে আমার ভেতরটাও ভারী হয়ে যায়। তুমি ভালো থাকলে আমি শান্তি পাই। আমি চাই তুমি এমন একটা জীবন পাও, যেখানে তুমি সবসময় নিজেকে ভালোবাসতে পারবে, নিজের মতো করে হাসতে পারবে। আর যদি সেই জীবনে আমার জায়গা থাকে, তাহলে সেটা হবে আমার সবচেয়ে বড় অর্জন।

তুমি জানো, আমি অন্যদের মতো না। তুমি যদি কখনো দূরে সরে যাও, তবুও আমি তোমার জন্য মনের ভেতর একটা জায়গা রেখে দেবো। আমি চিৎকার করবো না, অভিযোগ করবো না। শুধু নীরবে ভালোবাসবো। কারণ আমার ভালোবাসা পাওয়ার জন্য নয়, দেওয়ার জন্য।

তোমার প্রতিটা ছোট মুহূর্ত আমার কাছে গল্প হয়ে যায়। তোমার একটা “ভালোবাসি” শব্দ আমার পুরো দিনটাকে বদলে দেয়। তুমি হয়তো বুঝতে পারো না, কিন্তু তোমার সামান্য যত্নও আমার কাছে অনেক বড় ব্যাপার।

রাখি, তুমি আমার জীবনের সেই মানুষ, যাকে আমি শুধু চাই না, আমি অনুভব করি। তুমি আমার ভেতরের সবচেয়ে নরম অংশটাকে জাগিয়ে তুলেছো। তোমার জন্যই আমি আরও ভালো মানুষ হতে চাই। তোমার জন্যই আমি নিজের ভুলগুলো ঠিক করতে শিখছি।

আমি তোমাকে কোনো রাজকীয় প্রতিশ্রুতি দিতে পারি না। কিন্তু আমি দিতে পারি একটা সৎ হৃদয়। দিতে পারি এমন একটা ভালোবাসা, যেখানে প্রতারণা নেই, অভিনয় নেই। আছে শুধু সত্যি অনুভূতি।

আমি চাই একদিন তুমি এই চিঠিটা পড়ে বুঝবে, কেউ একজন তোমাকে এত গভীরভাবে ভালোবেসেছিল যে তার প্রতিটা শ্বাসে তোমার নাম ছিল। আমি চাই তুমি জানো, তোমার জন্য আমার ভালোবাসা সময়ের সাথে কমবে না। বরং প্রতিদিন একটু একটু করে আরও গভীর হবে।

রাখি, তুমি আমার প্রথম ভালোবাসা। আর আমি চাই তুমি আমার শেষও হও। আমি চাই না আমার হৃদয়ে আর কেউ তোমার জায়গা নিক। কারণ তুমি যে জায়গাটা নিয়েছো, সেটা একদম আলাদা। সেটা শুধু তোমার জন্য।

যদি কখনো আমি ভুল করি, আমাকে ঠিক করে দিও। যদি কখনো আমি দুর্বল হয়ে পড়ি, আমাকে শক্ত করে ধরো। কারণ আমি তোমাকে নিয়ে একটা জীবন গড়তে চাই যেখানে ভালোবাসা থাকবে, সম্মান থাকবে, বিশ্বাস থাকবে।

তুমি আমার জীবনের সবচেয়ে সুন্দর অধ্যায়। আমি জানি না আমাদের গল্প কত বড় হবে, কত দূর যাবে। কিন্তু যতদিন থাকবে, আমি চাই সেটা সত্যিকারের ভালোবাসায় ভরা থাকুক।

রাখি, তুমি আমার শান্তি। তুমি আমার সাহস। তুমি আমার প্রার্থনা। আমি যখন চোখ বন্ধ করি, তখন তোমার মুখটাই ভেসে ওঠে। আর তখন মনে হয় আমি পৃথিবীর সবচেয়ে ভাগ্যবান মানুষ।

আমি তোমাকে ভালোবাসি শুধু আজ না, শুধু এই মুহূর্ত না, আমি তোমাকে ভালোবাসি প্রতিটা আগামীকালেও। যতদিন আমার হৃদয় ধড়ফড় করবে, ততদিন সেখানে তোমার নাম থাকবে।
ভালোবাসা কখনো শব্দে শেষ হয় না। তবুও শেষ করছি এই বলে—
তুমি আমার। আর আমি, পুরোটা জুড়ে, শুধু তোমার।

let i = 0;
const textEl = document.getElementById("text");
const quoteBox = document.getElementById("quote");

document.getElementById("startBtn").addEventListener("click", function(){

  this.style.display="none";

  const letter = document.getElementById('letter');
  letter.style.display='block';

  function type(){
    if(i < text.length){
      textEl.innerHTML += text.charAt(i);
      i++;

      window.scrollTo({
        top: document.body.scrollHeight,
        behavior:"smooth"
      });

      setTimeout(type, 20 + Math.random()*40);
    }else{
      /* ✅ show quote after typing */
      quoteBox.style.display = "block";
    }
  }

  type();
});

/* hearts */
function createHeart(){
  const heart=document.createElement('div');
  heart.classList.add('heart');
  heart.style.left=Math.random()*100+'vw';
  heart.style.animationDuration=(6+Math.random()*6)+'s';
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),12000);
}

setInterval(createHeart,400);

</script>
