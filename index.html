<!DOCTYPE html><html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>অসম্পূর্ণ চিঠি</title>  <!-- Google Fonts -->  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@300;400;600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      font-family:'Noto Serif Bengali', serif;
      background: radial-gradient(circle at top, #2b2b55, #0f0f1a);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      color:#fff;
    }

    /* Floating glowing background */
    .bg-glow{
      position:absolute;
      width:600px;
      height:600px;
      background: radial-gradient(circle, rgba(255,105,180,0.4), transparent);
      filter: blur(120px);
      animation: moveGlow 10s infinite alternate ease-in-out;
    }

    @keyframes moveGlow{
      0%{transform:translate(-20%, -20%);} 
      100%{transform:translate(20%, 20%);} 
    }

    .container{
      width:90%;
      max-width:750px;
      padding:40px;
      border-radius:25px;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.08);
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
      text-align:center;
      z-index:2;
      animation: fadeUp 1.5s ease;
    }

    @keyframes fadeUp{
      from{opacity:0; transform:translateY(40px);} 
      to{opacity:1; transform:translateY(0);} 
    }

    h1{
      font-size:32px;
      margin-bottom:20px;
      color:#ffb6c1;
      letter-spacing:2px;
    }

    .btn{
      padding:12px 25px;
      border:none;
      border-radius:30px;
      background:linear-gradient(135deg,#ff4b91,#ff7eb3);
      color:#fff;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 5px 20px rgba(255,0,100,0.5);
    }

    .btn:hover{
      transform:scale(1.1);
    }

    .letter{
      margin-top:30px;
      text-align:left;
      line-height:2;
      font-size:18px;
      display:none;
      border-left:3px solid #ff9acb;
      padding-left:20px;
      animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn{
      from{opacity:0;} 
      to{opacity:1;} 
    }

    .cursor{
      display:inline-block;
      width:2px;
      background:#fff;
      animation: blink 1s infinite;
    }

    @keyframes blink{
      0%,100%{opacity:0;} 
      50%{opacity:1;} 
    }

    /* Floating hearts */
    .heart{
      position:absolute;
      width:15px;
      height:15px;
      background:#ff4b91;
      transform:rotate(45deg);
      animation: float 8s linear infinite;
    }

    .heart::before,
    .heart::after{
      content:'';
      position:absolute;
      width:15px;
      height:15px;
      background:#ff4b91;
      border-radius:50%;
    }

    .heart::before{top:-7px; left:0;}
    .heart::after{left:-7px; top:0;}

    @keyframes float{
      0%{transform:translateY(100vh) rotate(45deg); opacity:1;} 
      100%{transform:translateY(-10vh) rotate(45deg); opacity:0;} 
    }

  </style></head>
<body><div class="bg-glow"></div><div class="container">
  <h1>অসম্পূর্ণ চিঠি</h1><button class="btn" onclick="startLetter()">চিঠিটা পড়ো 💌</button>

  <div class="letter" id="letter"></div>
</div><script>

const text = তথ্য ণছ মধ্যে মত দর তো মম তো মতো মদদ মত তত মেজর তত মত মেজ দ মতো মতো যে যে মতো তো মতো মতো তো তো তো মন বন্ধ হল যদি মন মন মন মতো মতো মন যৌন বড়ো মন মতো
';

let i = 0;

function startLetter(){
  document.querySelector('.btn').style.display = 'none';
  const letter = document.getElementById('letter');
  letter.style.display = 'block';

  function type(){
    if(i < text.length){
      letter.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 40);
    }
  }

  type();
}

function createHeart(){
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.style.left = Math.random()*100 + 'vw';
  heart.style.animationDuration = (5 + Math.random()*5) + 's';
  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },8000);
}

setInterval(createHeart, 400);

</script></body>
</html>
